name: Publish NuGet packages

on:
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.201

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version=""
          fi

          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Restore
        run: dotnet restore Senlinz.Localization.slnx

      - name: Build
        run: >
          dotnet build Senlinz.Localization.slnx
          --configuration Release
          --no-restore
          -p:GeneratePackageOnBuild=false
          -p:ContinuousIntegrationBuild=true
          ${{ steps.version.outputs.value != '' && format('-p:Version={0}', steps.version.outputs.value) || '' }}

      - name: Test
        run: >
          dotnet test tests/Senlinz.Localization.Tests/Senlinz.Localization.Tests.csproj
          --configuration Release
          --no-build
          --verbosity normal
          ${{ steps.version.outputs.value != '' && format('-p:Version={0}', steps.version.outputs.value) || '' }}

      - name: Pack packages
        run: >
          dotnet pack Senlinz.Localization.slnx
          --configuration Release
          --no-build
          --output artifacts
          -p:ContinuousIntegrationBuild=true
          -p:GeneratePackageOnBuild=false
          ${{ steps.version.outputs.value != '' && format('-p:Version={0}', steps.version.outputs.value) || '' }}

      - name: Upload release package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-release-packages
          path: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          if-no-files-found: error

      - name: Publish packages to NuGet
        run: >
          dotnet nuget push artifacts/*.nupkg
          --api-key "${{ secrets.NUGET_API_KEY }}"
          --source "https://api.nuget.org/v3/index.json"
          --skip-duplicate

      - name: Publish symbol packages to NuGet
        shell: bash
        run: |
          if compgen -G "artifacts/*.snupkg" > /dev/null; then
            dotnet nuget push artifacts/*.snupkg \
              --api-key "${{ secrets.NUGET_API_KEY }}" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          else
            echo "No symbol packages were produced."
          fi
